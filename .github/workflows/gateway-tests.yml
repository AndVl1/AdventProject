name: gateway tests

on:
  pull_request:
    paths:
      - 'assistant-app/gateway/**'
      - 'assistant-app/backend/mvnw'
      - 'assistant-app/backend/.mvn/**'
      - '.github/workflows/gateway-tests.yml'
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: unit tests (gateway)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: assistant-app

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup jdk 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: mvn test (gateway)
        run: ./backend/mvnw -B -ntp -f gateway/pom.xml test

      - name: publish junit report
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: 'assistant-app/gateway/target/surefire-reports/TEST-*.xml'
          check_name: gateway junit
          detailed_summary: true
          include_passed: false

      - name: short summary
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          set -e
          REPORTS_DIR="assistant-app/gateway/target/surefire-reports"
          if [ ! -d "$REPORTS_DIR" ]; then
            echo "no surefire reports — build likely failed before tests" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          TOTAL=0; FAIL=0; ERR=0; SKIP=0
          for f in "$REPORTS_DIR"/TEST-*.xml; do
            [ -f "$f" ] || continue
            t=$(grep -oE 'tests="[0-9]+"'      "$f" | head -1 | grep -oE '[0-9]+' || echo 0)
            fl=$(grep -oE 'failures="[0-9]+"' "$f" | head -1 | grep -oE '[0-9]+' || echo 0)
            er=$(grep -oE 'errors="[0-9]+"'   "$f" | head -1 | grep -oE '[0-9]+' || echo 0)
            sk=$(grep -oE 'skipped="[0-9]+"'  "$f" | head -1 | grep -oE '[0-9]+' || echo 0)
            TOTAL=$((TOTAL + t))
            FAIL=$((FAIL + fl))
            ERR=$((ERR + er))
            SKIP=$((SKIP + sk))
          done
          PASS=$((TOTAL - FAIL - ERR - SKIP))
          {
            echo "## gateway unit tests"
            echo ""
            echo "| total | passed | failed | errors | skipped |"
            echo "|------:|-------:|-------:|-------:|--------:|"
            echo "| $TOTAL | $PASS | $FAIL | $ERR | $SKIP |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: assistant-app/gateway/target/surefire-reports/
          if-no-files-found: warn
          retention-days: 14
