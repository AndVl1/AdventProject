dotenv:
  directory: ../

server:
  port: 8090

spring:
  application:
    name: assistant-app

ai:
  koog:
    openrouter:
      enabled: true
      # base-url переопределяется на локальный LLM Gateway (assistant-app/gateway, порт 8091).
      # Реальный ключ для upstream OpenRouter живёт в gateway/.env, koog-клиент сюда передаёт
      # gateway-managed (gateway игнорирует входящий Authorization и подставляет свой).
      base-url: ${LLM_GATEWAY_URL:http://localhost:8091}
      api-key: ${OPENROUTER_API_KEY:gateway-managed}
    anthropic:
      enabled: ${ANTHROPIC_ENABLED:false}
      api-key: ${ANTHROPIC_API_KEY:}

gmail:
  client-id: ${GMAIL_CLIENT_ID:}
  client-secret: ${GMAIL_CLIENT_SECRET:}
  refresh-token: ${GMAIL_REFRESH_TOKEN:}
  user-email: ${GMAIL_USER_EMAIL:}

cors:
  allowed-origins: http://localhost:5173
